name: CI/CD WebSocket Pipeline

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ytalamas/websocket-challenge

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest 
    
    steps:
    # Step 1: Clone code from the repository
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Step 2: Configure Docker Buildx (Advanced building engine)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 3: Docker Hub Authentication using GitHub Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 4: Build and Push the image to Docker Hub (Real action)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest