apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server 
  labels:
    app: websocket-server
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: websocket-server
          image: websocket-challenge:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: websocket-config

          ports:
          - containerPort: 8080
            name: http-ws

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5 
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"